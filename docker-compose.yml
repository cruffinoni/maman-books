services:
  bot:
    image: ghcr.io/zoeille/maman-books:latest
    restart: unless-stopped
    env_file: .env
    environment:
      - USER_PREFS_FILE=data/user_prefs.json
    volumes:
      - ${BOOKS_DOWNLOAD_PATH}:${BOOKS_DOWNLOAD_PATH}:ro
      - ./data:/app/data
    networks:
      - internal
    depends_on:
      - telegram-bot-api

  telegram-bot-api:
    image: ghcr.io/tdlib/telegram-bot-api:latest
    restart: unless-stopped
    environment:
      - TELEGRAM_API_ID=${LOCAL_API_ID}
      - TELEGRAM_API_HASH=${LOCAL_API_HASH}
    networks:
      - internal
    volumes:
      - telegram-bot-api-data:/var/lib/telegram-bot-api
    command:
      - --local
      - --http-port=8081
      - --dir=/var/lib/telegram-bot-api

networks:
  internal:

volumes:
  telegram-bot-api-data:
